<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="8" fill="#3fb950"/>

  <!-- wordmark -->
  <text x="80" y="150" fill="#e6edf3" font-size="76" font-weight="800" letter-spacing="-1">agent2model</text>
  <text x="80" y="210" fill="#58a6ff" font-size="34" font-weight="600">Compile your agent into a small model's weights.</text>

  <!-- core line -->
  <text x="80" y="300" fill="#adbac7" font-size="30">Point it at a LangGraph graph or a YAML flowchart →</text>
  <text x="80" y="344" fill="#adbac7" font-size="30">it bakes the whole procedure into a Qwen 3B/8B.</text>

  <!-- payoff chips -->
  <g font-size="26" font-weight="700">
    <rect x="80" y="392" width="290" height="56" rx="28" fill="#0f2417" stroke="#3fb950" stroke-width="2"/>
    <text x="225" y="429" text-anchor="middle" fill="#3fb950">no orchestrator</text>

    <rect x="390" y="392" width="250" height="56" rx="28" fill="#0f2417" stroke="#3fb950" stroke-width="2"/>
    <text x="515" y="429" text-anchor="middle" fill="#3fb950">private + offline</text>

    <rect x="660" y="392" width="300" height="56" rx="28" fill="#0f2417" stroke="#3fb950" stroke-width="2"/>
    <text x="810" y="429" text-anchor="middle" fill="#3fb950">no per-turn $$$</text>
  </g>

  <!-- eval harness line -->
  <text x="80" y="510" fill="#8b949e" font-size="24">+ an eval harness that measures multi-turn procedure adherence</text>

  <!-- footer -->
  <text x="80" y="582" fill="#e6edf3" font-size="26" font-weight="700">pip install agent2model</text>
  <text x="1200" y="582" text-anchor="end" fill="#8b949e" font-size="24">github.com/kamaalg/agent2model · Apache-2.0</text>
</svg>
